<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>

<body>
  <div id="app">
    <app>
      <app-header></app-header>
      <app-footer></app-footer>
    </app>
    <child-component>
      {{ message }}
    </child-component>

    <!-- 작동하지 않습니다 -->
    <child-component></child-component>

    <div>
      <h3>나는 부모 컴포넌트의 제목입니다1</h3>
      <my-component>
        <p>이것은 원본 컨텐츠 입니다.</p>
        <p>이것은 원본 중 추가 컨텐츠 입니다</p>
      </my-component>
    </div>

    <div>
      <h3>나는 부모 컴포넌트의 제목입니다2</h3>
      <my-component> </my-component>
    </div>
    <child>
      <span slot-scope="{ text }">{{ text }}</span>
    </child>
  </div>
  <hr />
  <div id="app2">
    <app-layout>
      <h1 slot="header">여기에 페이지 제목이 위치합니다</h1>

      <p>메인 컨텐츠의 단락입니다.</p>
      <p>하나 더 있습니다.</p>

      <p slot="footer">여기에 연락처 정보입니다.</p>
    </app-layout>

    <div class="parent">
      <child>
        <template slot-scope="props">
          <span>hello from parent</span>
          <span>{{ props.text }}</span>
        </template>
      </child>
    </div>
    <hr />
    <my-awesome-list :items="items">
      <!-- scoped slot 역시 이름을 가질 수 있습니다 -->
      <li slot="item" slot-scope="props" class="my-fancy-item">
        {{ props.text }}
      </li>
    </my-awesome-list>

    <child>
      <span slot-scope="{ text }">{{ text }}</span>
    </child>
    <keep-alive>
      <component :is="currentView"></component>
    </keep-alive>
    <component :is="currentView"></component>
  </div>
  <hr>
  <div id="app3">
    <my-component :foo="baz" :bar="qux" @event-a="doThis" @event-b="doThat">
      <p slot="icon"></p>
      <p slot="main-text">Hello!</p>
    </my-component>

  </div>
  <div id="parent">
    <user-profile ref="profile"></user-profile>
    <async-example></async-example>
    <loading-comp></loading-comp>
  </div>
</body>
<script>
  Vue.component("my-awesome-list", {
    template: `<ul>
                    <slot name="item" v-for="item in items" 
                        :text="item.text">
                        <!-- 대체 컨텐츠는 여기입니다. -->
                    </slot>
                </ul>`,
    props: ["items"]
  });
  Vue.component("child", {
    template: `<div class="child">
        <slot text="템플레이트에서 지정한 텍스트"></slot>
      </div>`
  });
  Vue.component("app", {
    template: "<div></div>"
  });
  Vue.component("child-component", {
    // 이제 작동합니다. 올바른 위치에 놓여 있습니다.
    template: '<div v-show="someChildProperty">Child</div>',
    data: function () {
      return {
        someChildProperty: true
      };
    }
  });
  Vue.component("my-component", {
    template: `<div>
        <h4>나는 자식 컴포넌트의 제목입니다</h4>
        <slot>
          제공된 컨텐츠가 없는 경우에만 보실 수 있습니다.
        </slot>
      </div>`
  });
  var vm = new Vue({
    el: "#app",
    data: {
      message: "나타나지 않을 메세지"
    }
  });
  Vue.component("app-layout", {
    template: `<div class="container">
        <header>
          <slot name="header"></slot>
        </header>
        <main>
          <slot></slot>
        </main>
        <footer>
          <slot name="footer"></slot>
        </footer>
      </div>`
  });
  var vm2 = new Vue({
    el: "#app2",
    data() {
      return {
        items: [
          {
            text: 1
          },
          {
            text: 2
          }
        ],
        currentView: "boy"
      };
    },
    components: {
      boy: {
        template: "<h5>It's boy</h5>"
      },
      girl: {
        template: "<h5>It's girl</h5>"
      },
      // components에 등록되면 전역 등록이후에 등록됨 해당 영역만 재정의가된다.
      // child: {
      //   template: "<h5>It's child</h5>"
      // }
    }
  });
  var vm3 = new Vue({
    el: "#app3",
    data() {
      return {
        baz: 1,
        qux: 2
      }
    },
    methods: {
      doThis: function () {
        alert("doThis");
      },
      doThat: function () {
        alert("doThat");
      }
    },
    components: {
      myComponent: {
        template: `<div >
          <slot @click="eventA" name="icon"></slot>
          <slot @click="eventB" name="main-text"></slot>
          <p @click="eventA">eventA 바인딩{{ foo }}</p>
          <p @click="eventB">eventB 바인딩{{ bar }}</p>
          </div>`,
        props: ["foo", "bar"],
        methods: {
          eventA: function () {
            console.log(event.target);
            this.$emit('event-a')
          },
          eventB: function () {
            console.log(event.target);
            this.$emit('event-b')
          }
        }
      }
    }
  });
  Vue.component('async-example', function (resolve, reject) {
    console.log(resolve);
    console.log(reject);
    setTimeout(function () {
      // 컴포넌트 정의를 resolve 콜백에 전달합니다.
      resolve({
        template: '<div>I am async!</div>'
      })
    }, 2000)
  })
  Vue.component('async-webpack-example', function (resolve) {
    // 이 특별한 require 구문은 Webpack이 Ajax 요청을 통해
    // 로드되는 번들로 작성된 코드를 자동으로 분리하도록 지시합니다.
    //require(['./my-async-component'], resolve)
  })
  var LoadingComp = {
    template: '<h4>로딩중입니다.</h4>'
  }
  var ErrorComp = {
    template: '<h4>에러입니다.</h4>'
  }
  Vue.component('loading-comp', LoadingComp)
  var parent = new Vue({
    el: '#parent',
    components: {
      userProfile: {
        template: `<div>user-profile</div>`
      }
    }
  });

  // 자식 컴포넌트 인스턴스에 접근합니다.
  var child = parent.$refs.profile
  const AsyncComp = () => ({
    // 로드하는 컴포넌트입니다. 반드시 Promise이어야합니다.
    component: import('./MyComp.vue'),
    // 비동기 컴포넌트가 로드되는 동안 사용할 컴포넌트
    loading: LoadingComp,
    // 실패했을 경우 사용하는 컴포넌트
    error: ErrorComp,
    // 로딩 컴포넌트를 보여주기전 지연하는 정도. 기본값: 200ms.
    delay: 200,
    // 시간이 초과되면 에러용 컴포넌트가 표시됩니다
    // 기본값: Infinity.
    timeout: 3000
  })
  //AsyncComp();
</script>

</html>
