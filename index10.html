<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-model="message" placeholder="여기를 수정해보세요" />
      <p>메시지: {{ message }}</p>
      <span>여러 줄을 가지는 메시지:</span>
      <p style="white-space: pre-line">{{ message }}</p>
      <br />
      <textarea
        v-model="message"
        placeholder="여러줄을 입력해보세요"
      ></textarea>
      <textarea>{{ message }}</textarea>
      <input type="checkbox" id="checkbox" v-model="checked" />
      <label for="checkbox">{{ checked }}</label>
    </div>
    <div id="example-3">
      <input type="checkbox" id="jack" value="Jack" v-model="checkedNames" />
      <label for="jack">Jack</label>
      <input type="checkbox" id="john" value="John" v-model="checkedNames" />
      <label for="john">John</label>
      <input type="checkbox" id="mike" value="Mike" v-model="checkedNames" />
      <label for="mike">Mike</label>
      <br />
      <span>체크한 이름: {{ checkedNames }}</span>
      <br />
      <input type="radio" id="one" value="One" v-model="picked" />
      <label for="one">One</label>
      <br />
      <input type="radio" id="two" value="Two" v-model="picked" />
      <label for="two">Two</label>
      <br />
      <span>선택: {{ picked }}</span>
      <select v-model="selected">
        <option disabled value="">Please select one</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
      </select>
      <span>선택함: {{ selected }}</span>
      <br />
      <select v-model="selected">
        <option v-for="option in options" v-bind:value="option.value">
          {{ option.text }}
        </option>
      </select>
      <span>Selected: {{ selected }}</span>
      <br />

      <!-- `picked` 는 선택시 문자열 "a" 입니다 -->
      <input type="radio" id="label1" v-model="picked" value="a" />
      <label for="label1">One</label>
      <!-- `toggle` 는 true 또는 false 입니다 -->
      <input type="checkbox" id="label2" v-model="toggle" />
      <label for="label2">Two</label>
      <!-- `selected`는 "ABC" 선택시 "abc" 입니다 -->
      <select v-model="selected">
        <option value="abc">ABC</option>
      </select>
      <input
        type="checkbox"
        v-model="toggle"
        true-value="yes"
        false-value="no"
        id="label3"
      />
      <label for="label3">Three</label>
      <input type="radio" v-model="pick" v-bind:value="a" />
      <label for="label4">Four</label>
      <select v-model="selected">
        <!-- inline object literal -->
        <option v-bind:value="{ number: 123 }">123</option>
      </select>
      <!-- "input" 대신 "change" 이후에 동기화 됩니다. -->
      <input v-model.lazy="msg" />
      <input v-model.number="age" type="number" />
      <input v-model.trim="msg" />
    </div>
  </body>
  <script>
    var vm = new Vue({
      el: "#app",
      data: {
        message: "하하",
        checked: true
      }
    });
    new Vue({
      el: "#example-3",
      data: {
        checkedNames: [],
        picked: "",
        selected: [],
        options: [
          { text: "One", value: "A" },
          { text: "Two", value: "B" },
          { text: "Three", value: "C" }
        ],
        toggle: "",
        pick: "",
        a: "A다",
        msg: "메세지",
        age: "23"
      }
    });
  </script>
</html>
