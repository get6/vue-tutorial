<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  </head>
  <body>
    <div id="some-element">
      <my-component></my-component>
    </div>
    <div id="example">
      <my-component></my-component>
      <table>
        <tr is="my-row" :test="test"></tr>
      </table>

      <table>
        <my-row :test="test"></my-row>
      </table>
    </div>
  </body>
  <script>
    var Child = {
      // 해당 범위에서만
      template: "<div>사용자 정의 컴포넌트 입니다!</div>"
    };
    // 등록
    Vue.component("my-component", {
      // 전역 등록
      template: "<div>사용자 정의 컴포넌트 입니다!</div>"
    });
    new Vue({
      el: "#some-element",
      components: {
        // <my-component> 는 상위 템플릿에서만 사용할 수 있습니다.
        "my-component": Child
      }
      // 옵션
    });
    // 루트 인스턴스 생성
    new Vue({
      el: "#example",
      components: {
        "my-row": {
          props: ["test"],
          template: `<tr><td>{{test.text}}</td></tr>`
        }
      },
      data: {
        test: {
          text: "텍스트"
        }
      }
    });
  </script>
</html>
