<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <app>
        <app-header></app-header>
        <app-footer></app-footer>
      </app>
      <child-component>
        {{ message }}
      </child-component>

      <!-- 작동하지 않습니다 -->
      <child-component></child-component>

      <div>
        <h3>나는 부모 컴포넌트의 제목입니다1</h3>
        <my-component>
          <p>이것은 원본 컨텐츠 입니다.</p>
          <p>이것은 원본 중 추가 컨텐츠 입니다</p>
        </my-component>
      </div>

      <div>
        <h3>나는 부모 컴포넌트의 제목입니다2</h3>
        <my-component> </my-component>
      </div>
    </div>
    <hr />
    <div id="app2">
      <app-layout>
        <h1 slot="header">여기에 페이지 제목이 위치합니다</h1>

        <p>메인 컨텐츠의 단락입니다.</p>
        <p>하나 더 있습니다.</p>

        <p slot="footer">여기에 연락처 정보입니다.</p>
      </app-layout>

      <div class="parent">
        <child>
          <template slot-scope="props">
            <span>hello from parent</span>
            <span>{{ props.text }}</span>
          </template>
        </child>
      </div>
      <hr />
      <my-awesome-list :items="items">
        <!-- scoped slot 역시 이름을 가질 수 있습니다 -->
        <li slot="item" slot-scope="props" class="my-fancy-item">
          {{ props.text }}
        </li>
      </my-awesome-list>
    </div>
  </body>
  <script>
    Vue.component("my-awesome-list", {
      template: `<ul>
                    <slot name="item" v-for="item in items" 
                        :text="item.text">
                        <!-- 대체 컨텐츠는 여기입니다. -->
                    </slot>
                </ul>`,
      props: ["items"]
    });
    Vue.component("child", {
      template: `<div class="child">
        <slot text="hello from child"></slot>
      </div>`
    });
    Vue.component("app", {
      template: "<div></div>"
    });
    Vue.component("child-component", {
      // 이제 작동합니다. 올바른 위치에 놓여 있습니다.
      template: '<div v-show="someChildProperty">Child</div>',
      data: function() {
        return {
          someChildProperty: true
        };
      }
    });
    Vue.component("my-component", {
      template: `<div>
        <h4>나는 자식 컴포넌트의 제목입니다</h4>
        <slot>
          제공된 컨텐츠가 없는 경우에만 보실 수 있습니다.
        </slot>
      </div>`
    });
    var vm = new Vue({
      el: "#app",
      data: {
        message: "나타나지 않을 메세지"
      }
    });
    Vue.component("app-layout", {
      template: `<div class="container">
        <header>
          <slot name="header"></slot>
        </header>
        <main>
          <slot></slot>
        </main>
        <footer>
          <slot name="footer"></slot>
        </footer>
      </div>`
    });
    var vm2 = new Vue({
      el: "#app2",
      data() {
        return {
          items: [
            {
              text: 1
            },
            {
              text: 2
            }
          ]
        };
      }
    });
  </script>
</html>
