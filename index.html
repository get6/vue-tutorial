<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://cdn.rawgit.com/chrisvfritz/5f0a639590d6e648933416f90ba7ae4e/raw/974aa47f8f9c5361c5233bd56be37db8ed765a09/currency-validator.js"></script>
  </head>
  <body>
    <div id="some-element">
      <my-component></my-component>
    </div>
    <div id="example">
      <my-component></my-component>
      <table>
        <tr is="my-row" :test="test"></tr>
      </table>

      <table>
        <my-row :test="test"></my-row>
      </table>
      <simple-counter></simple-counter>
      <simple-counter></simple-counter>
      <simple-counter></simple-counter>
      <br />
      <child message="안녕하세요!"></child>
      <div>
        <input v-model="parentMsg" />
        <br />
        <child v-bind:my-message="parentMsg"></child>
        <br />
        <child :my-message="parentMsg"></child>
      </div>
    </div>
    <hr />
    <div id="example2">
      <counter-comp></counter-comp>
      <example prop-c="Hi"></example>
    </div>
    <hr />

    <div id="counter-event-example">
      <p>{{ total }}</p>
      <button-counter v-on:increment="incrementTotal"></button-counter>
      <button-counter v-on:increment="incrementTotal"></button-counter>
      <comp :foo.sync="bar"></comp>
      <comp :foo="bar" @update:foo="val => bar = val"></comp>
      <input v-model="something" />
      <br />
      <input
        v-bind:value="something"
        v-on:input="something = $event.target.value"
      />
      <br />
      <custom-input
        :value="something"
        @input="value => { something = value }"
      ></custom-input>
      <br />
      <currency-input v-model="price"></currency-input>
    </div>
    <hr />
    <div id="app">
      <currency-input label="Price" v-model="price"></currency-input>
      <currency-input label="Shipping" v-model="shipping"></currency-input>
      <currency-input label="Handling" v-model="handling"></currency-input>
      <currency-input label="Discount" v-model="discount"></currency-input>

      <p>Total: ${{ total }}</p>
      <my-checkbox v-model="foo" value="some value"></my-checkbox>
    </div>
  </body>
  <script>
    Vue.component("my-checkbox", {
      model: {
        prop: "checked",
        event: "change"
      },
      props: {
        // 다른 목적을 위해 `value` prop를 사용할 수 있습니다.
        checked: Boolean,
        value: String
      },
      template: '<input\
                  type="checkbox"\
                  ref="input">\
        '
    });
    Vue.component("currency-input", {
      template:
        '\
      <span>\
        $\
        <input\
          ref="input"\
          v-bind:value="value"\
          v-on:input="updateValue($event.target.value)">\
      </span>\
    ',
      props: ["value"],
      methods: {
        // 값을 직접 업데이트하는 대신 이 메소드를 사용하여
        // 입력 값에 대한 서식을 지정하고 배치 할 수 있습니다
        updateValue: function(value) {
          var formattedValue = value
            // 공백을 제거합니다.
            .trim()
            // 소수 자릿수 2자리로 줄입니다
            .slice(
              0,
              value.indexOf(".") === -1 ? value.length : value.indexOf(".") + 3
            );
          // 값이 아직 정규화 되지 않은 경우
          // 이를 수동으로 재정의하여 조건을 충족시킵니다.
          if (formattedValue !== value) {
            this.$refs.input.value = formattedValue;
          }
          // 입력 이벤트를 통해 숫자 값을 내보냅니다.
          this.$emit("input", Number(formattedValue));
        }
      }
    });
    Vue.component("currency-input", {
      template:
        '\
      <div>\
        <label v-if="label">{{ label }}</label>\
        $\
        <input\
          ref="input"\
          v-bind:value="value"\
          v-on:input="updateValue($event.target.value)"\
          v-on:focus="selectAll"\
          v-on:blur="formatValue"\
        >\
      </div>\
    ',
      props: {
        value: {
          type: Number,
          default: 0
        },
        label: {
          type: String,
          default: ""
        }
      },
      mounted: function() {
        this.formatValue();
      },
      methods: {
        updateValue: function(value) {
          var result = currencyValidator.parse(value, this.value);
          if (result.warning) {
            this.$refs.input.value = result.value;
          }
          this.$emit("input", result.value);
        },
        formatValue: function() {
          this.$refs.input.value = currencyValidator.format(this.value);
        },
        selectAll: function(event) {
          // Workaround for Safari bug
          // http://stackoverflow.com/questions/1269722/selecting-text-on-focus-using-jquery-not-working-in-safari-and-chrome
          setTimeout(function() {
            event.target.select();
          }, 0);
        }
      }
    });

    new Vue({
      el: "#app",
      data: {
        price: 0,
        shipping: 0,
        handling: 0,
        discount: 0,
        foo: true
      },
      computed: {
        total: function() {
          return (
            (this.price * 100 +
              this.shipping * 100 +
              this.handling * 100 -
              this.discount * 100) /
            100
          ).toFixed(2);
        }
      }
    });
    Vue.component("custom-input", {
      props: ["value"],
      template: `<input type="text" />`
    });
    Vue.component("comp", {
      props: ["foo"],
      template: "<div>{{ foo.text }}</div>"
    });
    var Child = {
      // 해당 범위에서만
      template: "<div>사용자 정의 컴포넌트 입니다!</div>"
    };
    // 등록
    Vue.component("my-component", {
      // 전역 등록
      template: "<span>{{ message }}</span>",
      data: function() {
        return {
          message: "hello"
        };
      }
    });
    Vue.component("simple-counter", {
      template: '<button v-on:click="counter += 1">{{ counter }}</button>',
      // 데이터는 기술적으로 함수이므로 Vue는 따지지 않지만
      // 각 컴포넌트 인스턴스에 대해 같은 객체 참조를 반환합니다.
      data: function() {
        return { counter: 0 };
      }
    });
    Vue.component("child", {
      // props 정의
      props: ["message", "my-message"],
      // 데이터와 마찬가지로 prop은 템플릿 내부에서 사용할 수 있으며
      // vm의 this.message로 사용할 수 있습니다.
      template: "<span>{{ myMessage }}</span>"
    });
    initialCounter = {
      text: "h2",
      name: "Veronica",
      company: "Veridian Dynamics"
    };
    Vue.component("counter-comp", {
      data: function() {
        return {
          counter: initialCounter
          //   text: "h1",
          //   name: "Veronica",
          //   company: "Veridian Dynamics"
        };
      },
      template: "<div>{{ counter.text }}</div>"
    });
    new Vue({
      el: "#some-element",
      components: {
        // <my-component> 는 상위 템플릿에서만 사용할 수 있습니다.
        "my-component": Child
      }
      // 옵션
    });
    // 루트 인스턴스 생성
    var vm = new Vue({
      el: "#example",
      components: {
        "my-row": {
          props: ["test"],
          template: `<tr><td>{{test.text}}</td></tr>`
        }
      },
      data: {
        test: {
          text: "텍스트"
        },
        parentMsg: "메세지~"
      }
    });
    Vue.component("example", {
      props: {
        // 기본 타입 확인 (`null` 은 어떤 타입이든 가능하다는 뜻입니다)
        propA: Number,
        // 여러개의 가능한 타입
        propB: [String, Number],
        // 문자열이며 꼭 필요합니다
        propC: {
          type: String,
          required: true
        },
        // 숫자이며 기본 값을 가집니다
        propD: {
          type: Number,
          default: 100
        },
        // 객체/배열의 기본값은 팩토리 함수에서 반환 되어야 합니다.
        propE: {
          type: Object,
          default: function() {
            return { message: "hello" };
          }
        },
        // 사용자 정의 유효성 검사 가능
        propF: {
          validator: function(value) {
            return value > 10;
          }
        }
      },
      // data: function() {
      //   return { propC: "12" };
      // },
      template: "<div>{{ propE.message }}</div>"
    });
    var vm = new Vue({
      el: "#example2",
      data: {
        counterObj: {
          text: "hi"
        }
      }
    });
    Vue.component("button-counter", {
      template: '<button v-on:click="incrementCounter">{{ counter }}</button>',
      data: function() {
        return {
          counter: 0
        };
      },
      methods: {
        incrementCounter: function() {
          this.counter += 1;
          console.log("increment 이벤트 실행");
          this.$emit("increment");
        }
      }
    });
    new Vue({
      el: "#counter-event-example",
      data: {
        total: 0,
        bar: {
          text: "Hi Foo"
        },
        something: "something",
        price: 10000
      },
      methods: {
        incrementTotal: function() {
          console.log("increment 이벤트 실행 완료");
          this.total += 1;
        }
      }
    });
  </script>
</html>
