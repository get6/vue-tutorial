<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        <navigation-link url="/profile">
            Your Profile
        </navigation-link>
        <br>
        <navigation-link url="/profile">
            <!-- Font Awesome 아이콘을 추가합시다 -->
            <span class="fa fa-user"></span>
            Your Profile
        </navigation-link>
        <br>
        <navigation-link url="/profile">
            <!-- 컴포넌트로 아이콘을 추가해봅시다 -->
            <font-awesome-icon name="user"></font-awesome-icon>
            Your Profile
        </navigation-link>
        <br>
        <navigation-link url="/profile">
            Logged in as {{ user.name }}
        </navigation-link>
        <br>
        <navigation-link url="/profile">
            Clicking here will send you to: {{ url }}
            <!--
            `url`은 undefined로 나올 겁니다. 이 데이터는 <navigation-link>_로_
            넘어가지만 <navigation-link> 컴포넌트 _안에_ 정의되어 있지는
            않으니까요.
            -->
        </navigation-link>
        <br>
        <submit-button>버트닝</submit-button>
        <submit-button></submit-button>
        <br>
        <base-layout></base-layout>
        <base-layout>
            <template v-slot:header>
                <h1>Here might be a page title</h1>
            </template>

            <p>A paragraph for the main content.</p>
            <p>And another one.</p>

            <template v-slot:footer>
                <p>Here's some contact info</p>
            </template>
        </base-layout>
        <!-- <current-user user="user"></current-user> -->
        <current-user :user="user">
            <template v-slot:default="slotProps">
                {{ slotProps.user.firstName }}
            </template>
        </current-user>
        <current-user :user="user" v-slot:default="slotProps"></current-user>
        <current-user :user="user" v-slot:default="slotProps">
            {{ slotProps.user.firstName }}
        </current-user>
        <current-user :user="user" v-slot="slotProps">
            {{ slotProps.user.firstName }}
        </current-user>
    </div>
</body>
<script>
    Vue.component('navigation-link', {
        props: ["url"],
        template: `<a
            v-bind:href="url"
            class="nav-link"
            >
            <slot></slot>
            </a>`
    });
    Vue.component('font-awesome-icon', {
        props: ["name"],
        template: `<span
            >{{ name }}
            </span>`
    });
    Vue.component('submit-button', {
        template: `<button type="submit">
                <slot>Submit</slot>
                </button>`
    });
    Vue.component('base-layout', {
        template: `<div class="container">
                <header>
                    <slot name="header"></slot>
                </header>
                <main>
                    <slot></slot>
                </main>
                <footer>
                    <slot name="footer"></slot>
                </footer>
                </div>`
    })
    Vue.component('current-user', {
        props: ["user"],
        template: `<span>
                <slot v-bind:user="user">
                    {{ user.lastName }}
                </slot>
                </span>`
    })
    var vm = new Vue({
        el: "#app",
        data() {
            return {
                user: {
                    lastName: "황",
                    firstName: "성준",
                    name: "성준 황"
                },
                url: "/index2.html",
                slotProps: {
                    user: {
                        lastName: "황",
                        firstName: "성준",
                    }
                }
            }
        },

    })
</script>

</html>
